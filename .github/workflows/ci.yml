name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff pyflakes
      - name: Lint
        run: |
          ruff check scmorphjepa/
          pyflakes scmorphjepa/ tests/
      - name: Tests
        run: pytest tests/ -q
